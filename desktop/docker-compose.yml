services:
  symbi:
    image: ghcr.io/thirdkeyai/symbi:latest
    container_name: symbi-coordinator
    restart: unless-stopped
    ports:
      - "${SYMBI_GRPC_PORT:-8080}:8080"
      - "${SYMBI_HTTP_PORT:-8081}:8081"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CHAT_MODEL=${CHAT_MODEL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-}
      - SYMBI_AUTH_TOKEN=${SYMBI_AUTH_TOKEN}
      - SYMBIONT_VECTOR_BACKEND=${SYMBIONT_VECTOR_BACKEND:-lancedb}
      - SYMBIONT_VECTOR_DATA_PATH=/var/lib/symbi/vector
      - SYMBIONT_VECTOR_COLLECTION=${SYMBIONT_VECTOR_COLLECTION:-symbiont_context}
      - SYMBIONT_VECTOR_DIMENSION=${SYMBIONT_VECTOR_DIMENSION:-384}
      - COMPOSIO_API_KEY=${COMPOSIO_API_KEY:-}
      # Qdrant (only with --profile qdrant):
      # - SYMBIONT_VECTOR_HOST=symbi-qdrant
      # - SYMBIONT_VECTOR_PORT=6333
    volumes:
      - symbi-data:/var/lib/symbi
      - ./agents:/etc/symbi/agents:ro
      - ./symbi.toml:/etc/symbi/symbi.toml:ro
      - ./policies:/etc/symbi/policies:ro
      - symbi-memory:/var/lib/symbi/memory
      - symbi-vector:/var/lib/symbi/vector
    command:
      - "up"
      - "--port"
      - "8080"
      - "--http-port"
      - "8081"
      - "--http.token"
      - "env:SYMBI_AUTH_TOKEN"
      - "--http.audit"
    healthcheck:
      test: ["CMD", "symbi", "--version"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - symbi-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: symbi-qdrant
    restart: unless-stopped
    profiles:
      - qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    networks:
      - symbi-net

  a2ui:
    image: ghcr.io/thirdkeyai/symbi-a2ui:latest
    build:
      context: ../../symbiont/crates/symbi-a2ui
      dockerfile: Dockerfile
    container_name: symbi-a2ui
    restart: unless-stopped
    ports:
      - "${A2UI_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
    networks:
      - symbi-net
    depends_on:
      symbi:
        condition: service_healthy

  litestream:
    image: litestream/litestream:latest
    container_name: symbi-litestream
    restart: unless-stopped
    environment:
      - GCS_STATE_BUCKET=${GCS_STATE_BUCKET:-}
    volumes:
      - symbi-data:/var/lib/symbi
      - ./litestream.yml:/etc/litestream.yml:ro
    command: ["replicate"]
    depends_on:
      symbi:
        condition: service_healthy
    networks:
      - symbi-net

volumes:
  symbi-data:
    name: symbi-data
  symbi-memory:
    name: symbi-memory
  symbi-vector:
    name: symbi-vector
  qdrant-data:
    name: symbi-qdrant-data

networks:
  symbi-net:
    name: symbi-network
    driver: bridge
