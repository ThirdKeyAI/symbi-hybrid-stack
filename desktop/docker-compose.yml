# ThirdKey images pinned to 1.5.0. Third-party images (qdrant, litestream)
# left at :latest — update them independently as needed.
services:
  symbi:
    image: ghcr.io/thirdkeyai/symbi:1.5.0
    container_name: symbi-coordinator
    restart: unless-stopped
    ports:
      - "${SYMBI_API_PORT:-8080}:8080"
      - "${SYMBI_HTTP_PORT:-8081}:8081"
    networks:
      - symbi-net
    environment:
      - HOME=/var/lib/symbi
      - SYMBIONT_MASTER_KEY=${SYMBIONT_MASTER_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CHAT_MODEL=${CHAT_MODEL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-}
      - SYMBI_AUTH_TOKEN=${SYMBI_AUTH_TOKEN}
      - SYMBIONT_VECTOR_BACKEND=${SYMBIONT_VECTOR_BACKEND:-lancedb}
      - SYMBIONT_VECTOR_COLLECTION=${SYMBIONT_VECTOR_COLLECTION:-symbiont_context}
      - SYMBIONT_VECTOR_DIMENSION=${SYMBIONT_VECTOR_DIMENSION:-384}
      - SYMBIONT_VECTOR_HOST=${SYMBIONT_VECTOR_HOST:-}
      - SYMBIONT_VECTOR_PORT=${SYMBIONT_VECTOR_PORT:-}
      - COMPOSIO_API_KEY=${COMPOSIO_API_KEY:-}
      - SYMBIONT_API_TOKEN=${SYMBIONT_API_TOKEN:-${SYMBI_AUTH_TOKEN}}
      - SYMBIONT_TRUSTED_PROXIES=${SYMBIONT_TRUSTED_PROXIES:-}
    volumes:
      - symbi-data:/var/lib/symbi
      - ./agents:/etc/symbi/agents:ro
      - ./symbi.toml:/var/lib/symbi/symbi.toml:ro
      - ./policies:/etc/symbi/policies:ro
      - symbi-memory:/var/lib/symbi/memory
      - symbi-vector:/var/lib/symbi/vector
    command:
      - "up"
      - "--port"
      - "8080"
      - "--http-port"
      - "8081"
      - "--http-bind"
      - "0.0.0.0"
      - "--http.token"
      - "${SYMBI_AUTH_TOKEN}"
      - "--http.audit"
    healthcheck:
      test: ["CMD-SHELL", "grep -q ':1F91 ' /proc/net/tcp 2>/dev/null || grep -q ':1F91 ' /proc/net/tcp6 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    depends_on:
      qdrant:
        condition: service_healthy
        required: false

  qdrant:
    image: qdrant/qdrant:latest
    container_name: symbi-qdrant
    restart: unless-stopped
    profiles:
      - qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    networks:
      - symbi-net

  a2ui:
    image: ghcr.io/thirdkeyai/symbi-a2ui:1.5.0
    container_name: symbi-a2ui
    restart: unless-stopped
    ports:
      - "${A2UI_PORT:-3001}:3001"
    volumes:
      - ./a2ui/Caddyfile:/etc/caddy/Caddyfile:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
    networks:
      - symbi-net
    depends_on:
      symbi:
        condition: service_healthy

  litestream:
    image: litestream/litestream:latest
    container_name: symbi-litestream
    restart: unless-stopped
    profiles:
      - replication
    environment:
      - GCS_STATE_BUCKET=${GCS_STATE_BUCKET:-}
    volumes:
      - symbi-data:/var/lib/symbi
      - ./litestream.yml:/etc/litestream.yml:ro
    command: ["replicate"]
    depends_on:
      symbi:
        condition: service_healthy
    networks:
      - symbi-net

# Named volumes are created automatically on first `docker compose up`.
# If they already exist from a previous project name, Docker Compose may
# print "volume ... already exists but was not created by Docker Compose".
# This warning is cosmetic and safe to ignore.
volumes:
  symbi-data:
    name: symbi-data
  symbi-memory:
    name: symbi-memory
  symbi-vector:
    name: symbi-vector
  qdrant-data:
    name: symbi-qdrant-data

networks:
  symbi-net:
    name: symbi-network
    driver: bridge
